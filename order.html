<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказать | Цветы У-Сирины</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Лого" class="logo-img">
            <span class="logo-text">Цветы У-Сирины</span>
        </a>
        <nav><a href="index.html">Каталог</a><a href="order.html">Заказать</a><a href="address.html">Адрес</a></nav>
    </header>

    <div class="order-container">
        <h1>Оформление заказа</h1>
        <form>
            <label><b>Выберите букет из каталога:</b></label>
            <div class="bouquet-grid">
                <input type="radio" name="b" id="b1" required><label for="b1" class="bouquet-card">1</label>
                <input type="radio" name="b" id="b2"><label for="b2" class="bouquet-card">2</label>
                <input type="radio" name="b" id="b3"><label for="b3" class="bouquet-card">3</label>
                <input type="radio" name="b" id="b4"><label for="b4" class="bouquet-card">4</label>
                <input type="radio" name="b" id="b5"><label for="b5" class="bouquet-card">5</label>
                <input type="radio" name="b" id="b6"><label for="b6" class="bouquet-card">6</label>
                <input type="radio" name="b" id="b7"><label for="b7" class="bouquet-card">7</label>
                <input type="radio" name="b" id="b8"><label for="b8" class="bouquet-card">8</label>
                <input type="radio" name="b" id="b9"><label for="b9" class="bouquet-card">9</label>
                <input type="radio" name="b" id="b10"><label for="b10" class="bouquet-card">10</label>
                <input type="radio" name="b" id="b11"><label for="b11" class="bouquet-card">11</label>
                <input type="radio" name="b" id="b12"><label for="b12" class="bouquet-card">12</label>
                <input type="radio" name="b" id="b13"><label for="b13" class="bouquet-card">13</label>
                <input type="radio" name="b" id="b14"><label for="b14" class="bouquet-card">14</label>
                <input type="radio" name="b" id="b15"><label for="b15" class="bouquet-card">15</label>
            </div>
            <input type="text" placeholder="Ваше имя" required>
            <input type="tel" placeholder="Ваш номер телефона" required>
            <button type="submit" class="btn-submit">Отправить заказ</button>
        </form>
    </div>

    <footer>
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Лого" class="logo-img">
            <span class="logo-text">Цветы У-Сирины</span>
        </a>
         <nav><a href="index.html">Каталог</a><a href="order.html">Заказать</a><a href="address.html">Адрес</a></nav>
    </header>
    </footer>
</body>
</html>
